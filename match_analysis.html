<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Detective — Match Analysis</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F2F5F0;
      --block: #DEE2E6;
      --accent: #DD1234;
      --text: #1c1c1c;
      --muted: #4a4a4a;
      --line: #c7ccd1;
      --radius: 14px;
      --font: "Noto Sans", sans-serif;
      --ok: #16a34a;
      --warn: #d97706;
      --bad: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Loading ── */
    #ma-loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ma-loading-box {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px 40px;
      text-align: center;
      min-width: 280px;
    }
    .ma-loading-logo {
      font-family: 'Material Symbols Outlined';
      font-size: 40px;
      color: var(--accent);
      display: block;
      margin-bottom: 10px;
    }
    .ma-loading-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .ma-spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--block);
      border-top: 3px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px auto;
    }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .ma-status-text {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Page ── */
    .ma-page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 20px 64px 20px;
    }

    /* ── Header ── */
    .ma-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 24px;
      padding-bottom: 18px;
      border-bottom: 1px solid var(--line);
    }
    .ma-header-left {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex: 1;
      min-width: 0;
    }
    .ma-logo {
      font-family: 'Material Symbols Outlined';
      font-size: 36px;
      color: var(--accent);
      line-height: 1;
      flex-shrink: 0;
    }
    .ma-title-wrap { min-width: 0; }
    .ma-title {
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
    }
    .ma-subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      word-break: break-all;
      display: block;
    }
    .ma-url-link {
      font-size: 11px;
      color: var(--accent);
      text-decoration: none;
      margin-top: 3px;
      word-break: break-all;
      display: block;
    }
    .ma-url-link:hover { text-decoration: underline; }
    .ma-header-btns {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .ma-save-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      flex-shrink: 0;
    }
    .ma-save-btn:hover { opacity: 0.88; }
    .ma-reload-btn {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--font);
      cursor: pointer;
      text-decoration: none;
      flex-shrink: 0;
      display: inline-block;
    }
    .ma-reload-btn:hover { background: var(--block); }
    .ma-gen-time {
      font-size: 10px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ── Score Card ── */
    .ma-score-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      display: flex;
      gap: 32px;
      align-items: flex-start;
      position: sticky;
      top: 16px;
      z-index: 100;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    .ma-score-left {
      text-align: center;
      flex-shrink: 0;
    }
    .ma-score-num {
      font-size: 52px;
      font-weight: 700;
      line-height: 1;
    }
    .ma-score-num.chip-ok   { color: var(--ok); }
    .ma-score-num.chip-warn { color: var(--warn); }
    .ma-score-num.chip-bad  { color: var(--bad); }
    .ma-score-label {
      font-size: 11px;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Summary bars ── */
    .ma-summary {
      flex: 1;
      display: grid;
      gap: 8px;
    }
    .ma-summary-row {
      display: grid;
      grid-template-columns: 130px 1fr 44px;
      align-items: center;
      gap: 8px;
    }
    .ma-summary-label { font-size: 12px; color: var(--text); }
    .ma-bar-wrap {
      height: 6px;
      background: var(--block);
      border-radius: 999px;
      overflow: hidden;
    }
    .ma-bar {
      height: 100%;
      border-radius: 999px;
      transition: width 0.6s ease;
    }
    .ma-bar.chip-ok   { background: var(--ok); }
    .ma-bar.chip-warn { background: var(--warn); }
    .ma-bar.chip-bad  { background: var(--bad); }
    .ma-summary-pct {
      font-size: 11px;
      font-weight: 700;
      text-align: right;
    }
    .ma-summary-pct.chip-ok   { color: var(--ok); }
    .ma-summary-pct.chip-warn { color: var(--warn); }
    .ma-summary-pct.chip-bad  { color: var(--bad); }

    /* ── Block ── */
    .ma-block {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .ma-block-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--bg);
    }
    .ma-block-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--accent);
    }
    .ma-chip {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .ma-chip.chip-ok   { background: #dcfce7; color: var(--ok); }
    .ma-chip.chip-warn { background: #fef3c7; color: var(--warn); }
    .ma-chip.chip-bad  { background: #fee2e2; color: var(--bad); }

    /* ── Two Columns ── */
    .ma-two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .ma-col { padding: 12px 14px; }
    .ma-col:first-child { border-right: 1px solid var(--line); }
    .ma-col-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--line);
    }

    /* ── Rows ── */
    .ma-row {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 5px 0;
      border-bottom: 1px solid #f0f0f0;
      line-height: 1.3;
      word-break: break-word;
    }
    .ma-row:last-child { border-bottom: none; }
    .ma-row.ok      { color: var(--ok); }
    .ma-row.bad     { color: var(--bad); }
    .ma-row.warn    { color: var(--warn); }
    .ma-row.neutral { color: var(--muted); }
    .ma-row.meta    { color: var(--muted); font-size: 11px; }

    /* ── Color swatch ── */
    .ma-swatch {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.12);
      flex-shrink: 0;
    }

    /* ── Block Toggle ── */
    .ma-block-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .ma-collapse-btn {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      border-radius: 999px;
      width: 24px;
      height: 24px;
      font-size: 12px;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      flex-shrink: 0;
    }
    .ma-collapse-btn:hover { background: var(--block); }
    .ma-block.ma-collapsed .ma-two-col,
    .ma-block.ma-collapsed .ma-infra-note { display: none; }
    .ma-toggle-btn {
      font-size: 10px;
      font-weight: 700;
      font-family: var(--font);
      padding: 3px 9px;
      border-radius: 999px;
      border: 1.5px solid;
      cursor: pointer;
      letter-spacing: 0.04em;
      line-height: 1.4;
      transition: background 0.15s, color 0.15s;
    }
    .ma-toggle-on  { background: #dcfce7; color: #16a34a; border-color: #16a34a; }
    .ma-toggle-off { background: #f3f4f6; color: #9ca3af; border-color: #d1d5db; }
    .ma-block--off { opacity: 0.38; }
    .ma-block--off .ma-chip { background: #f3f4f6 !important; color: #9ca3af !important; }
    .ma-summary-row--off { opacity: 0.35; }
    .ma-summary-row--off .ma-bar   { background: #d1d5db !important; }
    .ma-summary-row--off .ma-summary-pct { color: #9ca3af !important; }

    /* ── Infrastructure Block ── */
    .ma-infra-block .ma-block-head { flex-wrap: wrap; gap: 8px; }
    .ma-infra-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 999px;
    }
    .ma-infra-badge-diff { background: #fef3c7; color: #d97706; }
    .ma-infra-badge-same { background: #dcfce7; color: #16a34a; }
    .ma-infra-note {
      font-size: 11px;
      color: var(--muted);
      padding: 8px 16px;
      background: #f8fafc;
      border-bottom: 1px solid var(--line);
      font-style: italic;
    }
    .ma-infra-cat {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 10px;
      margin-bottom: 4px;
    }
    .ma-infra-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 4px;
    }
    .ma-infra-tag {
      background: var(--block);
      color: var(--text);
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 999px;
    }
    .ma-infra-none {
      font-size: 12px;
      color: var(--muted);
      padding: 8px 0;
      font-style: italic;
    }

    /* ── Footer ── */
    .ma-footer {
      margin-top: 32px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
      font-size: 10px;
      color: var(--line);
      text-align: center;
    }
  </style>
</head>
<body>

  <div id="ma-loading">
    <div class="ma-loading-box">
      <span class="ma-loading-logo">keyboard_command_key</span>
      <div class="ma-loading-title">Match Analysis</div>
      <div class="ma-spinner"></div>
      <div id="ma-status-text" class="ma-status-text">Initializing...</div>
    </div>
  </div>

  <div id="ma-root" style="display:none;"></div>

  <script src="report_utils.js"></script>
  <script src="match_analysis.js"></script>
</body>
</html>
