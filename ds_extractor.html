<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Digital Detective — DS Extractor</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,700,0,0&family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F2F5F0;
      --block: #DEE2E6;
      --accent: #DD1234;
      --text: #1c1c1c;
      --muted: #4a4a4a;
      --line: #c7ccd1;
      --radius: 14px;
      --pad: 16px;
      --gap: 16px;
      --font: "Noto Sans", sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }
    .page {
      max-width: 960px;
      margin: 24px auto 64px auto;
      padding: 0 20px;
    }
    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .app-logo {
      font-family: 'Material Symbols Outlined';
      font-size: 36px;
      color: var(--accent);
      line-height: 1;
      user-select: none;
    }
    .app-title {
      margin: 0;
      font-size: 24px;
      font-weight: 700;
    }
    .app-subtitle {
      margin: 0 0 20px 0;
      color: var(--muted);
      font-size: 13px;
    }
    .panel {
      background: var(--block);
      border-radius: var(--radius);
      padding: var(--pad);
      margin-bottom: 18px;
    }
    .panel-title {
      color: var(--accent);
      font-weight: 700;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin: 0 0 12px 0;
    }
    .scope-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    }
    .scope-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .scope-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 10px rgba(221,18,52,0.12);
    }
    .scope-card h3 {
      margin: 0 0 6px 0;
      font-size: 14px;
      font-weight: 700;
    }
    .scope-card p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
    }
    .input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 14px;
      background: #ffffff;
    }
    .textarea {
      width: 100%;
      min-height: 220px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 13px;
      background: #ffffff;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }
    .action-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 12px;
      gap: 8px;
    }
    .primary-btn {
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
    }
    .ghost-btn {
      background: #ffffff;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 12px;
      cursor: pointer;
    }
    .help-text {
      font-size: 12px;
      color: var(--muted);
      margin-top: 8px;
    }
    .status {
      display: none;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 12px;
      font-size: 12px;
      color: var(--muted);
      align-items: center;
      gap: 8px;
    }
    .status.is-active { display: flex; }
    .status.is-error { background: #fff0f0; color: var(--accent); }
    .status.is-success { background: #f0faf0; color: #16a34a; }
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--block);
      border-top: 2px solid var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .hidden { display: none; }
  </style>
</head>
<body>
  <main class="page">
    <div class="app-header">
      <span class="app-logo">palette</span>
      <h1 class="app-title">DS Extractor</h1>
    </div>
    <p class="app-subtitle">Generate a design system report from a full page or a selected component.</p>

    <section class="panel" id="scope-panel">
      <h2 class="panel-title">Choose Scope</h2>
      <div class="scope-grid">
        <button class="scope-card" type="button" data-scope="page">
          <h3>Full Page</h3>
          <p>Extract the design system from everything loaded on the current page.</p>
        </button>
        <button class="scope-card" type="button" data-scope="element">
          <h3>Selected Element</h3>
          <p>Paste a component HTML snippet and extract only the relevant tokens.</p>
        </button>
      </div>
      <p class="help-text" id="source-note">Source: —</p>
    </section>

    <section class="panel hidden" id="element-panel">
      <h2 class="panel-title">Paste Component HTML</h2>
      <textarea class="textarea" placeholder="Paste HTML here" data-html></textarea>
      <div class="help-text">Tip: use Element Picker to copy outerHTML.</div>
      <div class="action-row">
        <button class="ghost-btn" type="button" data-back>Back</button>
        <button class="primary-btn" type="button" data-generate>Generate Component DS</button>
      </div>
    </section>

    <div class="status" id="status">
      <div class="spinner" id="spinner"></div>
      <span id="status-text">Working...</span>
    </div>

  </main>

  <script src="ds_extractor.js"></script>
</body>
</html>
